{% extends 'inicio/base.html' %}
{% block title %}Editar Plan de Clase{% endblock %}

{% block content %}
<div style="margin-bottom:1rem">
  <a href="{% url 'docente_detalle_plan' plan.pk %}" style="font-size:12px;color:var(--ink-3);text-decoration:none">← Volver</a>
</div>
<div style="max-width:720px">
  <h1 style="font-size:22px;font-weight:700;color:var(--ink);margin-bottom:1.5rem">Editar Plan de Clase</h1>
  {% if messages %}{% for msg in messages %}
  <div style="background:#fee2e2;color:#991b1b;padding:.75rem 1rem;border-radius:9px;margin-bottom:1rem;font-size:13px">{{ msg }}</div>
  {% endfor %}{% endif %}
  <form method="post">
    {% csrf_token %}
    <div style="background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin-bottom:5px">Título *</label>
        <input type="text" name="titulo" value="{{ plan.titulo }}" required
          style="width:100%;height:38px;border:1px solid var(--border);border-radius:9px;padding:0 12px;font-size:13px;background:#f7f8fc;color:var(--ink);outline:none;box-sizing:border-box">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin-bottom:5px">Fecha inicio</label>
          <input type="date" name="fecha_inicio" value="{{ plan.fecha_inicio|date:'Y-m-d' }}"
            style="width:100%;height:38px;border:1px solid var(--border);border-radius:9px;padding:0 12px;font-size:13px;background:#f7f8fc;color:var(--ink);outline:none;box-sizing:border-box">
        </div>
        <div>
          <label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin-bottom:5px">Fecha fin</label>
          <input type="date" name="fecha_fin" value="{{ plan.fecha_fin|date:'Y-m-d' }}"
            style="width:100%;height:38px;border:1px solid var(--border);border-radius:9px;padding:0 12px;font-size:13px;background:#f7f8fc;color:var(--ink);outline:none;box-sizing:border-box">
        </div>
      </div>
      <div>
        <label style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin-bottom:5px">Objetivo general</label>
        <textarea name="objetivo_general" rows="3"
          style="width:100%;border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;background:#f7f8fc;color:var(--ink);outline:none;resize:none;box-sizing:border-box">{{ plan.objetivo_general}}</textarea>
      </div>
    </div>
    <button type="submit"
      style="height:42px;padding:0 28px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer">
      Guardar cambios
    </button>
  </form>
</div>
{% endblock %}
