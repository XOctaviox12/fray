{% extends 'inicio/base.html' %}
{% block content %}
<style>
  :root {
    /* ── Colores principales (Design Tokens oficiales) ── */
    --color-primary: #F02614;
    --color-primary-hover: #C71F10;
    --color-primary-light: #FDE9E6;

    /* ── Fondos ── */
    --bg-page: #F8F9FB;
    --bg-surface: #FFFFFF;

    /* ── Texto ── */
    --text-primary: #1F2937;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --text-white: #FFFFFF;

    /* ── Bordes ── */
    --border-light: #E5E7EB;

    /* ── Sombras ── */
    --shadow-xs: 0 2px 8px rgba(15,23,42,.05);
    --shadow-sm: 0 6px 18px rgba(15,23,42,.06);

    /* ── Radios ── */
    --radius-input: 16px;
    --radius-button: 16px;
    --radius-card: 22px;

    /* ── Espaciado (sistema de 8 puntos) ── */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;

    --font-family: "Inter", "SF Pro Display", sans-serif;
    --transition-fast: 150ms;
  }

  * { font-family: var(--font-family); }

  .form-wrap { max-width: 560px; margin: 0 auto; }

  .form-card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-xs); }
  .form-card-head { padding: var(--space-6); border-bottom: 1px solid var(--border-light); background: var(--bg-page); }
  .form-card-body { padding: var(--space-6); }

  .card-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0; letter-spacing: -.01em; }
  .card-sub { font-size: 11.5px; color: var(--text-secondary); margin: 3px 0 0; }

  .btn-row { display: flex; gap: var(--space-3); margin-top: var(--space-5); }
  .btn-submit {
    flex: 2; min-height: 44px; box-sizing: border-box; padding: var(--space-4);
    background: var(--color-primary); color: var(--text-white);
    border: none; border-radius: var(--radius-button); font-size: 11.5px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .08em; cursor: pointer;
    font-family: var(--font-family); transition: all var(--transition-fast);
  }
  .btn-submit:hover { background: var(--color-primary-hover); box-shadow: var(--shadow-sm); }
  .btn-submit:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }
  .btn-submit:active { transform: translateY(1px); }

  .btn-cancel {
    flex: 1; min-height: 44px; box-sizing: border-box; padding: var(--space-4);
    background: var(--bg-surface);
    border: 1px solid var(--border-light); color: var(--text-secondary);
    border-radius: var(--radius-button); font-size: 11.5px; font-weight: 700;
    text-align: center; text-decoration: none; transition: all var(--transition-fast);
    font-family: var(--font-family); display: flex; align-items: center; justify-content: center;
  }
  .btn-cancel:hover { border-color: var(--text-primary); color: var(--text-primary); }
  .btn-cancel:focus-visible { outline: 2px solid var(--text-primary); outline-offset: 2px; }

  /* Style Django's form.as_p */
  .form-card-body p { margin: 0 0 var(--space-4); }
  .form-card-body p:last-of-type { margin-bottom: 0; }
  .form-card-body label {
    display: block; font-size: 9.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .1em; color: var(--text-muted); margin-bottom: var(--space-1);
  }
  .form-card-body input,
  .form-card-body select,
  .form-card-body textarea {
    width: 100%; box-sizing: border-box;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-input);
    padding: var(--space-3) var(--space-4);
    font-size: 14px; color: var(--text-primary);
    background: var(--bg-surface); font-family: var(--font-family);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  }
  .form-card-body input:focus,
  .form-card-body select:focus,
  .form-card-body textarea:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-light);
  }
  .form-card-body .helptext {
    display: block; font-size: 11px; color: var(--text-secondary); margin-top: var(--space-1);
  }
  .form-card-body ul.errorlist {
    list-style: none; margin: var(--space-1) 0 0; padding: 0;
    color: #B00020; font-size: 11.5px; font-weight: 600;
  }
</style>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-card-head">
      <h2 class="card-title">Registrar Nuevo Alumno</h2>
      <p class="card-sub">Completa el formulario para dar de alta al alumno.</p>
    </div>
    <div class="form-card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-row">
          <a href="{% url 'dashboard' %}" class="btn-cancel">Cancelar</a>
          <button type="submit" class="btn-submit">Guardar Alumno</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
