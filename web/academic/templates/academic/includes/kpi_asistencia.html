<div class="bg-white rounded-[2rem] border border-slate-200 p-6 shadow-sm">
    <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Asistencia Mes</span>
    </div>
    <p class="text-4xl font-black text-slate-800">{{ asistencia_mes }}%</p>
    <div class="mt-3 w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
        <div class="h-full rounded-full transition-all duration-700
            {% if asistencia_mes >= 85 %}bg-emerald-500{% elif asistencia_mes >= 70 %}bg-amber-500{% else %}bg-rose-500{% endif %}"
             style="width: {{ asistencia_mes }}%">
        </div>
    </div>
    <p class="text-[9px] text-slate-400 font-bold mt-2 uppercase tracking-wide">
        {% if asistencia_mes >= 85 %}Asistencia saludable{% elif asistencia_mes >= 70 %}Asistencia aceptable{% else %}Asistencia crítica{% endif %}
    </p>
</div>
