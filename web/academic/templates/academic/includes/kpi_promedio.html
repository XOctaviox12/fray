<div class="bg-white rounded-[2rem] border border-slate-200 p-6 shadow-sm">
    <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
        </div>
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Promedio General</span>
    </div>
    <p class="text-4xl font-black text-slate-800">
        {{ promedio_general|floatformat:1 }}
    </p>
    <div class="mt-3 flex items-center gap-2">
        {% if promedio_general >= 8 %}
            <span class="inline-flex items-center gap-1 text-[9px] font-black bg-emerald-50 text-emerald-700 px-2 py-1 rounded-full uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Excelente
            </span>
        {% elif promedio_general >= 6 %}
            <span class="inline-flex items-center gap-1 text-[9px] font-black bg-amber-50 text-amber-700 px-2 py-1 rounded-full uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> Regular
            </span>
        {% else %}
            <span class="inline-flex items-center gap-1 text-[9px] font-black bg-rose-50 text-rose-700 px-2 py-1 rounded-full uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> Bajo
            </span>
        {% endif %}
    </div>
</div>
