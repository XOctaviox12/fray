<div class="bg-white rounded-[2rem] border border-slate-200 p-6 shadow-sm">
    <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 {% if alumnos_riesgo > 0 %}bg-rose-50{% else %}bg-emerald-50{% endif %} rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 {% if alumnos_riesgo > 0 %}text-rose-600{% else %}text-emerald-600{% endif %}"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">En Riesgo</span>
    </div>
    <p class="text-4xl font-black {% if alumnos_riesgo > 0 %}text-rose-600{% else %}text-slate-800{% endif %}">
        {{ alumnos_riesgo }}
    </p>
    <div class="mt-3">
        {% if alumnos_riesgo > 0 %}
            <span class="inline-flex items-center gap-1 text-[9px] font-black bg-rose-50 text-rose-700 px-2 py-1 rounded-full uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>
                Alumnos con promedio &lt; 6.0
            </span>
        {% else %}
            <span class="inline-flex items-center gap-1 text-[9px] font-black bg-emerald-50 text-emerald-700 px-2 py-1 rounded-full uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Sin alertas
            </span>
        {% endif %}
    </div>
</div>
