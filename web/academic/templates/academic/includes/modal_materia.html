<!-- Modal agregar materia al grupo -->
<div id="modal-materia"
     class="hidden fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-sm
            flex items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] max-w-md w-full shadow-2xl overflow-hidden">

        <div class="p-8 border-b border-slate-100">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-black text-slate-800 uppercase tracking-tighter">
                    Asignar Materia
                </h3>
                <button onclick="document.getElementById('modal-materia').classList.add('hidden')"
                        class="p-2 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors">
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <form method="POST" class="p-8 space-y-5">
            {% csrf_token %}
            <input type="hidden" name="btn_materia" value="1">

            <div class="space-y-2">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Materia</label>
                {{ form_mat.nombre }}
                {% if form_mat.nombre.errors %}
                    <p class="text-[10px] text-rose-500 font-bold">{{ form_mat.nombre.errors.0 }}</p>
                {% endif %}
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Clave</label>
                    {{ form_mat.clave }}
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Créditos</label>
                    {{ form_mat.creditos }}
                </div>
            </div>

            {% if form_mat.non_field_errors %}
            <div class="bg-rose-50 border-l-4 border-rose-500 text-rose-600 p-3 rounded-r-xl text-xs font-bold">
                {{ form_mat.non_field_errors.0 }}
            </div>
            {% endif %}

            <div class="pt-4 flex gap-3">
                <button type="submit"
                        class="flex-1 bg-{{ color }}-600 text-white py-3.5 rounded-2xl
                               text-[10px] font-black uppercase tracking-widest
                               hover:bg-{{ color }}-700 shadow-lg transition-all">
                    Guardar materia
                </button>
                <button type="button"
                        onclick="document.getElementById('modal-materia').classList.add('hidden')"
                        class="px-6 bg-slate-100 text-slate-500 rounded-2xl
                               text-[10px] font-black uppercase hover:bg-slate-200 transition-all">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>
