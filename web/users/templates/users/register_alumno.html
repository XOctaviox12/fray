{% extends 'inicio/base.html' %}
{% block content %}
<style>
  :root {
    --ink: #111318; --ink-2: #6b7280; --ink-3: #9ca3af;
    --border: #e8eaf0; --bg: #f4f5f9; --white: #fff;
    --accent: #4f6ef7;
  }
  .form-wrap { max-width: 560px; margin: 0 auto; }

  .form-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .form-card-head { padding: 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .form-card-body { padding: 24px; }

  .card-title { font-family: 'Instrument Serif', serif; font-size: 20px; font-weight: 400; color: var(--ink); margin: 0; letter-spacing: -.02em; }
  .card-sub { font-size: 11.5px; color: var(--ink-2); margin: 3px 0 0; }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn-submit {
    flex: 2; padding: 13px; background: var(--accent); color: #fff;
    border: none; border-radius: 11px; font-size: 11.5px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .08em; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif; transition: all .16s;
  }
  .btn-submit:hover { background: #3b56e8; box-shadow: 0 4px 14px rgba(79,110,247,.3); }
  .btn-cancel {
    flex: 1; padding: 13px; background: var(--white);
    border: 1px solid var(--border); color: var(--ink-2);
    border-radius: 11px; font-size: 11.5px; font-weight: 700;
    text-align: center; text-decoration: none; transition: all .16s;
    font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center;
  }
  .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }

  /* Style Django's form.as_p */
  .form-card-body p { margin: 0 0 14px; }
  .form-card-body label { display: block; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); margin-bottom: 5px; }
</style>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-card-head">
      <h2 class="card-title">Registrar Nuevo Alumno</h2>
      <p class="card-sub">Completa el formulario para dar de alta al alumno.</p>
    </div>
    <div class="form-card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-row">
          <a href="{% url 'dashboard' %}" class="btn-cancel">Cancelar</a>
          <button type="submit" class="btn-submit">Guardar Alumno</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
